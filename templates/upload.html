{% extends "base.html" %}
{% block content %}
<section class="form-card">
    <h2>{{ "Upload Excel" if mode == "upload" else "Manual Input" }}</h2>
    <p>Pastikan pengupload dan versioning selalu diisi.</p>

    {% if mode == "upload" %}
    <form method="POST" enctype="multipart/form-data">
        <label for="uploader">Pengupload</label>
        <input id="uploader" name="uploader" required>

        <label for="version">Versioning</label>
        <input id="version" name="version" required>

        <label for="data_type">Tipe Data</label>
        <select id="data_type" name="data_type">
            <option value="flow">Flow</option>
            <option value="stock">Stock</option>
        </select>

        <label for="time_period">Periode</label>
        <select id="time_period" name="time_period">
            <option value="monthly">Bulanan</option>
            <option value="quarterly">Triwulanan</option>
            <option value="yearly">Tahunan</option>
        </select>

        <label for="excel_file">File Excel</label>
        <input id="excel_file" name="excel_file" type="file" accept=".xls,.xlsx" required>

        <button type="submit" class="primary">Upload</button>
    </form>
    {% else %}
    <form method="POST">
        <label for="uploader">Pengupload</label>
        <input id="uploader" name="uploader" required>

        <label for="version">Versioning</label>
        <input id="version" name="version" required>

        <label for="data_type">Tipe Data</label>
        <select id="data_type" name="data_type">
            <option value="flow">Flow</option>
            <option value="stock">Stock</option>
        </select>

        <label for="time_period">Periode</label>
        <select id="time_period" name="time_period" onchange="updatePeriodFormat()">
            <option value="monthly">Bulanan</option>
            <option value="quarterly">Triwulanan</option>
            <option value="yearly">Tahunan</option>
        </select>

        <label for="period_date">Tanggal Periode</label>
        <input id="period_date" name="period_date" type="text" placeholder="YYYY-MM untuk bulanan, YYYY untuk tahunan" required>

        <label for="indicator">Indikator</label>
        <input id="indicator" name="indicator" required>

        <label for="value">Nilai</label>
        <input id="value" name="value" type="number" step="any" required>

        <button type="submit" class="primary">Simpan Manual</button>
    </form>
    {% endif %}

    <script>
    function updatePeriodFormat() {
        const timePeriod = document.getElementById('time_period').value;
        const periodInput = document.getElementById('period_date');

        switch(timePeriod) {
            case 'monthly':
                periodInput.placeholder = 'Format: YYYY-MM (contoh: 2024-01)';
                periodInput.pattern = '\\d{4}-\\d{2}';
                periodInput.title = 'Format: YYYY-MM';
                break;
            case 'quarterly':
                periodInput.placeholder = 'Format: YYYY-Q1/Q2/Q3/Q4 (contoh: 2024-Q1)';
                periodInput.pattern = '\\d{4}-Q[1-4]';
                periodInput.title = 'Format: YYYY-Q1 sampai YYYY-Q4';
                break;
            case 'yearly':
                periodInput.placeholder = 'Format: YYYY (contoh: 2024)';
                periodInput.pattern = '\\d{4}';
                periodInput.title = 'Format: YYYY';
                break;
        }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
        updatePeriodFormat();
    });
    </script>
</section>
{% endblock %}
