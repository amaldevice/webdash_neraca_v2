{% extends "base.html" %}
{% block content %}
<section class="card shadow-sm mb-4">
    <div class="card-body">
        <h2 class="card-title h4">Dasbor Ringkasan</h2>
        <p class="card-text text-muted">Ringkasan data terbaru dari proses agregasi.</p>
    </div>
</section>

<section class="mb-4">
    <div class="row g-3">
        {% for card in summary.cards %}
        <div class="col-sm-6 col-lg-4">
            <article class="card h-100 shadow-sm">
                <div class="card-body">
                    <h4 class="h6 text-uppercase text-muted">{{ card.title }}</h4>
                    <p class="display-6 fw-semibold mb-1">{{ card.value }}</p>
                    <span class="text-muted">{{ card.label }}</span>
                </div>
            </article>
        </div>
        {% endfor %}
    </div>
</section>

<section class="d-flex flex-wrap gap-2">
    <a class="btn btn-primary" href="{{ url_for('upload_data') }}">Unggah Excel</a>
    <a class="btn btn-primary" href="{{ url_for('manual_input') }}">Input Manual</a>
    <a class="btn btn-outline-primary" href="{{ url_for('aggregated_summary') }}">Lihat Ringkasan Agregat</a>
</section>
{% endblock %}
