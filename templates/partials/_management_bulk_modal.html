<dialog id="bulk-update-modal" class="modal">
    <div class="modal-box max-w-lg">
        <h3 class="text-lg font-semibold">Perbarui Data Terpilih</h3>
        <p class="text-base-content/60 text-sm">Isi kolom yang ingin diubah. Kolom yang kosong tidak akan diperbarui.</p>

        <form id="bulk-update-form" method="POST" class="grid gap-4 mt-4">
            <input type="hidden" name="action" value="bulk_update">
            <div class="form-control">
                <label for="bulk_update_uploader" class="label">
                    <span class="label-text">Pengunggah Baru (opsional)</span>
                </label>
                <input type="text" id="bulk_update_uploader" name="bulk_update_uploader" class="control" placeholder="Biarkan kosong jika tidak ingin mengubah">
            </div>
            <div class="form-control">
                <label for="bulk_update_version" class="label">
                    <span class="label-text">Versi Baru (opsional)</span>
                </label>
                <input type="text" id="bulk_update_version" name="bulk_update_version" class="control" placeholder="Biarkan kosong jika tidak ingin mengubah">
            </div>
            <div class="form-control">
                <label for="bulk_update_data_type" class="label">
                    <span class="label-text">Jenis Data Baru (opsional)</span>
                </label>
                <select id="bulk_update_data_type" name="bulk_update_data_type" class="control">
                    <option value="">-- Tidak diubah --</option>
                    <option value="flow">Flow</option>
                    <option value="stock">Stock</option>
                </select>
            </div>
            <div class="form-control">
                <label for="bulk_update_time_period" class="label">
                    <span class="label-text">Periode Baru (opsional)</span>
                </label>
                <select id="bulk_update_time_period" name="bulk_update_time_period" class="control">
                    <option value="">-- Tidak diubah --</option>
                    <option value="monthly">Bulanan</option>
                    <option value="quarterly">Triwulanan</option>
                    <option value="yearly">Tahunan</option>
                </select>
            </div>
            <div class="form-control">
                <label for="bulk_update_value" class="label">
                    <span class="label-text">Nilai Baru (opsional)</span>
                </label>
                <input type="number" step="0.01" id="bulk_update_value" name="bulk_update_value" class="control" placeholder="Biarkan kosong jika tidak ingin mengubah">
            </div>
            <div class="flex justify-end gap-2">
                <button type="button" class="btn-soft" onclick="closeBulkUpdateModal()">Batal</button>
                <button type="submit" class="btn btn-primary">Perbarui Data</button>
            </div>
        </form>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button type="submit">close</button>
    </form>
</dialog>

<dialog id="confirm-action-modal" class="modal" aria-labelledby="confirm-action-title" aria-describedby="confirm-action-message">
    <div class="modal-box max-w-md">
        <h3 id="confirm-action-title" class="text-lg font-semibold">Konfirmasi Tindakan</h3>
        <p id="confirm-action-message" class="py-3 text-base-content/70"></p>
        <div class="modal-action">
            <button id="confirm-action-cancel" type="button" class="btn-soft">Batal</button>
            <button id="confirm-action-submit" type="button" class="btn btn-error">Hapus</button>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button type="submit">close</button>
    </form>
</dialog>

<form id="bulk-delete-form" method="POST" style="display: none;">
    <input type="hidden" name="action" value="bulk_delete">
</form>
