<script src="https://cdn.plot.ly/plotly-3.3.1.min.js" integrity="sha256-4rD3fugVb/nVJYUv5Ky3v+fYXoouHaBSP20WIJuEiWg=" crossorigin="anonymous"></script>
<script>
const sampleData = [
    {% for card in summary.cards %}
    {type: "{{ card.title }}", value: {{ card.value }}, label: "{{ card.label }}"},
    {% endfor %}
];

function setButtonLoading(button, isLoading) {
    if (!button) return;
    button.disabled = isLoading;
    button.classList.toggle('loading', isLoading);
    button.classList.toggle('pointer-events-none', isLoading);
}

document.getElementById('generate-pivot').addEventListener('click', function() {
    const generatePivotButton = this;
    const indicator = document.getElementById('analysis_indicator').value;
    const year = document.getElementById('analysis_year').value;

    if (!indicator) {
        alert('Pilih indikator terlebih dahulu.');
        return;
    }

    const resultDiv = document.getElementById('pivot-result');
    resultDiv.innerHTML = '<div class="text-center text-base-content/60 py-4">Sedang memproses analisis periode...</div>';
    setButtonLoading(generatePivotButton, true);

    const formData = new URLSearchParams();
    formData.append('indicator', indicator);
    formData.append('year', year);

    fetch('/generate-period-analysis', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: formData.toString()
    })
    .then(response => response.json())
    .then(data => {
        if (data.error) {
            resultDiv.innerHTML = '<div class="text-center text-error py-4">' + data.error + '</div>';
            return;
        }

        const analysis = data.analysis;
        const analysisHTML = generatePeriodAnalysisHTML(analysis);
        resultDiv.innerHTML = analysisHTML;

        // Activate tabs behavior (DaisyUI tabs are visual only; we handle content toggling here)
        const tabEls = resultDiv.querySelectorAll('[data-tab]');
        const sectionEls = resultDiv.querySelectorAll('[data-section]');
        tabEls.forEach(tab => {
            tab.addEventListener('click', () => {
                const key = tab.getAttribute('data-tab');
                tabEls.forEach(t => {
                    const active = (t === tab);
                    t.classList.toggle('btn-primary', active);
                    t.classList.toggle('btn-soft', !active);
                });
                sectionEls.forEach(sec => {
                    sec.classList.toggle('hidden', sec.getAttribute('data-section') !== key);
                });
            });
        });
    })
    .catch(error => {
        resultDiv.innerHTML = '<div class="text-center text-error py-4">Gagal menghasilkan analisis: ' + error.message + '</div>';
    })
    .finally(() => {
        setButtonLoading(generatePivotButton, false);
    });
});

function generatePeriodAnalysisHTML(analysis) {
    let html = `
        <div class="flex flex-col gap-2">
            <h4 class="text-lg font-semibold">Analisis Periode: ${analysis.indicator}</h4>
            <div class="alert alert-info text-sm">
                <span><strong>Tahun Analisis:</strong> ${analysis.analysis_year}</span>
            </div>
        </div>
    `;

    // Render panjang -> gunakan kombinasi Tabs + Accordion (collapse)
    // agar halaman tidak terlalu panjang.
    const hasQQ = analysis.quarterly_comparison && analysis.quarterly_comparison.length > 0;
    const hasMM = analysis.monthly_comparison && analysis.monthly_comparison.length > 0;
    const hasYY = analysis.yearly_comparison && analysis.yearly_comparison.length > 0;
    const hasYTD = analysis.ytd_comparison && analysis.ytd_comparison.length > 0;
    const hasCC = analysis.current_to_current && analysis.current_to_current.length > 0;

    const tabs = [];
    if (hasMM) tabs.push({ key: 'mm', label: 'M ke M' });
    if (hasQQ) tabs.push({ key: 'qq', label: 'Q ke Q' });
    if (hasYY) tabs.push({ key: 'yy', label: 'Y ke Y' });
    if (hasYTD) tabs.push({ key: 'ytd', label: 'YTD' });
    if (hasCC) tabs.push({ key: 'cc', label: 'C ke C' });

    const defaultTab = tabs.length ? tabs[0].key : null;

    html += `
      <div class="mt-6">
        <div class="bg-base-200/40 border border-base-200 rounded-box p-2">
          <div class="join flex flex-wrap gap-2">
            ${tabs.map(t => `
              <button type="button" class="${t.key===defaultTab?'btn btn-sm join-item btn-primary':'btn-soft btn-sm join-item'}" data-tab="${t.key}">
                <span>${t.label}</span>
              </button>
            `).join('')}
          </div>
        </div>

        <div class="mt-4 space-y-3" id="analysis-sections">
    `;

    // helper: wrap into collapse
    function collapse(title, bodyHtml, openByDefault=true) {
      return `
        <div class="collapse collapse-arrow bg-base-200/40 border border-base-200 rounded-box">
          <input type="checkbox" ${openByDefault ? 'checked' : ''} />
          <div class="collapse-title font-semibold">${title}</div>
          <div class="collapse-content">${bodyHtml}</div>
        </div>
      `;
    }

    if (hasQQ) {
      let body = `
        <div class="overflow-x-auto max-h-[520px] overflow-y-auto">
          <table class="table table-zebra w-full">
            <thead>
              <tr class="text-base-content/60">
                <th>Kuartal</th>
                <th>Nilai Saat Ini</th>
                <th>Nilai Sebelumnya</th>
                <th>Perubahan (%)</th>
                <th>Tren</th>
              </tr>
            </thead>
            <tbody>
      `;

      analysis.quarterly_comparison.forEach(item => {
        const trendClass = item.change_type === 'increase' ? 'text-success' : 'text-error';
        const trendSymbol = item.change_type === 'increase' ? '↗️' : '↘️';
        body += `
          <tr>
            <td>${item.period}</td>
            <td>${item.current_value.toLocaleString()}</td>
            <td>${item.previous_value.toLocaleString()}</td>
            <td class="${trendClass}">${item.change_percent > 0 ? '+' : ''}${item.change_percent}%</td>
            <td>${trendSymbol}</td>
          </tr>
        `;
      });

      body += `</tbody></table></div>`;
      html += `<div data-section="qq" class="${defaultTab==='qq'?'':'hidden'}">${collapse('Perbandingan Kuartal ke Kuartal (Q ke Q)', body, true)}</div>`;
    }

    if (hasMM) {
      let body = `
        <div class="overflow-x-auto max-h-[520px] overflow-y-auto">
          <table class="table table-zebra w-full">
            <thead>
              <tr class="text-base-content/60">
                <th>Bulan</th>
                <th>Nilai Saat Ini</th>
                <th>Nilai Sebelumnya</th>
                <th>Perubahan (%)</th>
                <th>Tren</th>
              </tr>
            </thead>
            <tbody>
      `;

      analysis.monthly_comparison.forEach(item => {
        const trendClass = item.change_type === 'increase' ? 'text-success' : 'text-error';
        const trendSymbol = item.change_type === 'increase' ? '↗️' : '↘️';
        body += `
          <tr>
            <td>${item.period}</td>
            <td>${item.current_value.toLocaleString()}</td>
            <td>${item.previous_value.toLocaleString()}</td>
            <td class="${trendClass}">${item.change_percent > 0 ? '+' : ''}${item.change_percent}%</td>
            <td>${trendSymbol}</td>
          </tr>
        `;
      });

      body += `</tbody></table></div>`;
      html += `<div data-section="mm" class="${defaultTab==='mm'?'':'hidden'}">${collapse('Perbandingan Bulan ke Bulan (M ke M)', body, true)}</div>`;
    }

    if (hasYY) {
      let body = `
        <div class="overflow-x-auto max-h-[520px] overflow-y-auto">
          <table class="table table-zebra w-full">
            <thead>
              <tr class="text-base-content/60">
                <th>Tahun</th>
                <th>Nilai Saat Ini</th>
                <th>Nilai Sebelumnya</th>
                <th>Perubahan (%)</th>
                <th>Tren</th>
              </tr>
            </thead>
            <tbody>
      `;

      analysis.yearly_comparison.forEach(item => {
        const trendClass = item.change_type === 'increase' ? 'text-success' : 'text-error';
        const trendSymbol = item.change_type === 'increase' ? '↗️' : '↘️';
        body += `
          <tr>
            <td>${item.period}</td>
            <td>${item.current_value.toLocaleString()}</td>
            <td>${item.previous_value.toLocaleString()}</td>
            <td class="${trendClass}">${item.change_percent > 0 ? '+' : ''}${item.change_percent}%</td>
            <td>${trendSymbol}</td>
          </tr>
        `;
      });

      body += `</tbody></table></div>`;
      html += `<div data-section="yy" class="${defaultTab==='yy'?'':'hidden'}">${collapse('Perbandingan Tahun ke Tahun (Y ke Y)', body, true)}</div>`;
    }

    if (hasYTD) {
      let body = '';
      analysis.ytd_comparison.forEach(yearData => {
        if (yearData.monthly_ytd && yearData.monthly_ytd.length > 0) {
          let table = `
            <div class="overflow-x-auto max-h-[520px] overflow-y-auto">
              <table class="table table-zebra w-full">
                <thead>
                  <tr class="text-base-content/60">
                    <th>Bulan</th>
                    <th>Nilai YTD</th>
                  </tr>
                </thead>
                <tbody>
          `;
          yearData.monthly_ytd.forEach(item => {
            table += `
              <tr>
                <td>${item.period}</td>
                <td>${item.ytd_value.toLocaleString()}</td>
              </tr>
            `;
          });
          table += `</tbody></table></div>`;
          body += collapse(`YTD Bulanan - ${yearData.year}`, table, false);
        }
      });
      html += `<div data-section="ytd" class="${defaultTab==='ytd'?'':'hidden'}">${collapse('Analisis Tahun Berjalan (YTD)', body || '<p class="text-base-content/60">Tidak ada data YTD.</p>', true)}</div>`;
    }

    if (hasCC) {
      let body = `
        <div class="overflow-x-auto max-h-[520px] overflow-y-auto">
          <table class="table table-zebra w-full">
            <thead>
              <tr class="text-base-content/60">
                <th>Periode</th>
                <th>Nilai Tahun Berjalan</th>
                <th>Nilai Tahun Sebelumnya</th>
                <th>Perubahan (%)</th>
                <th>Tren</th>
              </tr>
            </thead>
            <tbody>
      `;

      analysis.current_to_current.forEach(item => {
        const trendClass = item.change_type === 'increase' ? 'text-success' : 'text-error';
        const trendSymbol = item.change_type === 'increase' ? '↗️' : '↘️';
        body += `
          <tr>
            <td>${item.period}</td>
            <td>${item.current_value.toLocaleString()}</td>
            <td>${item.previous_year_value.toLocaleString()}</td>
            <td class="${trendClass}">${item.change_percent > 0 ? '+' : ''}${item.change_percent}%</td>
            <td>${trendSymbol}</td>
          </tr>
        `;
      });

      body += `</tbody></table></div>`;
      html += `<div data-section="cc" class="${defaultTab==='cc'?'':'hidden'}">${collapse('Perbandingan Periode Berjalan ke Periode Sejenis (C ke C)', body, true)}</div>`;
    }

    html += `
        </div>
      </div>
    `;

    html += `
        <div class="mt-4">
            <button class="btn-soft" onclick="exportPeriodAnalysis('${analysis.indicator}', '${analysis.analysis_year}')">Ekspor Analisis</button>
        </div>
    `;

    return html;
}

function exportPeriodAnalysis(indicator, year) {
    alert('Fitur ekspor analisis periode akan diimplementasikan di sini.');
    console.log('Exporting analysis for:', indicator, 'Year:', year);
}

document.getElementById('reset-pivot').addEventListener('click', function() {
    document.getElementById('pivot-result').innerHTML = '<p class="text-base-content/60 mb-0">Pilih indikator dan klik "Hasilkan Analisis Periode" untuk melihat analisis perbandingan periode.</p>';
    document.getElementById('pivot-form').reset();
});

document.addEventListener('DOMContentLoaded', function() {
    const generateBtn = document.getElementById('generate-plot');
    if (generateBtn) {
        generateBtn.addEventListener('click', handlePlotGeneration);
    }
});

function handlePlotGeneration() {
    const generatePlotButton = document.getElementById('generate-plot');
    const indicatorFilter = document.getElementById('indicator_filter');
    const timeRange = document.getElementById('time_range');

    if (!indicatorFilter || !timeRange) {
        alert('Elemen formulir tidak ditemukan.');
        return;
    }

    const indicatorValue = indicatorFilter.value;
    const timeValue = timeRange.value;

    if (!indicatorValue || indicatorValue === "") {
        alert('Pilih indikator terlebih dahulu.');
        return;
    }

    const plotContainer = document.getElementById('plot-container');
    const plotDisplay = document.getElementById('plot-display');

    if (!plotContainer || !plotDisplay) {
        return;
    }

    plotDisplay.innerHTML = '<div class="text-center text-base-content/60 py-5">Sedang membuat grafik garis...</div>';
    plotContainer.style.display = 'block';
    setButtonLoading(generatePlotButton, true);

    const formData = new URLSearchParams();
    formData.append('indicator_filter', indicatorValue);
    formData.append('time_range', timeValue);

    fetch('/generate-plot', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: formData.toString()
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Kesalahan HTTP, status: ' + response.status);
        }
        return response.text().then(text => {
            try {
                return JSON.parse(text);
            } catch (e) {
                throw new Error('Respons JSON tidak valid: ' + text.substring(0, 200));
            }
        });
    })
    .then(data => {
        if (data && data.error) {
            plotDisplay.innerHTML = '<div class="text-center text-error py-5">' + data.error + '</div>';
            return;
        }

        if (!data || !data.plot_json) {
            plotDisplay.innerHTML = '<div class="text-center text-error py-5">Kesalahan: data grafik tidak tersedia.</div>';
            return;
        }

        const fig = JSON.parse(data.plot_json);
        plotDisplay.innerHTML = '';
        Plotly.newPlot(plotDisplay, fig.data, fig.layout, fig.config || {});
    })
    .catch(error => {
        plotDisplay.innerHTML = '<div class="text-center text-error py-5">Gagal membuat grafik: ' + error.message + '</div>';
    })
    .finally(() => {
        setButtonLoading(generatePlotButton, false);
    });
}
</script>
