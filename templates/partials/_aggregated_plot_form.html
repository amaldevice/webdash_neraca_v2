<section class="panel mb-6">
    <div class="section-title">
        <div>
            <h3 class="text-lg font-semibold">Visualisasi Grafik Garis</h3>
            <p class="hint">Hasilkan grafik garis tren indikator BPS untuk analisis perubahan waktu.</p>
        </div>
    </div>

    <div class="form-grid">
        <div class="form-control">
            <label for="indicator_filter" class="label">
                <span class="label-text">Pilih Indikator</span>
            </label>
            <select id="indicator_filter" name="indicator_filter" class="control">
                <option value="">Pilih indikator...</option>
                {% for indicator in summary.indicators %}
                <option value="{{ indicator }}">{{ indicator }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-control">
            <label for="time_range" class="label">
                <span class="label-text">Rentang Waktu</span>
            </label>
            <select id="time_range" name="time_range" class="control">
                <option value="all">Semua Periode</option>
                {% set available_years = summary.available_years if summary is defined and summary.available_years is defined else [] %}
                {% for year in available_years %}
                <option value="{{ year }}">Tahun {{ year }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-actions-bar border-t-0 pt-0 items-end">
            <button type="button" id="generate-plot" class="btn btn-primary">Hasilkan Grafik Garis</button>
        </div>
    </div>
    <div id="plot-form-status" class="alert alert-warning text-sm mt-4 hidden" role="status" aria-live="polite"></div>

    <div class="mt-6 border-t border-base-300 pt-6 aggregated-plot-container" id="plot-container" style="display: none;">
        <div id="plot-display" class="aggregated-plot-display"></div>
    </div>
</section>
