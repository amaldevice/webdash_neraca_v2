<section class="panel mb-6">
    <div class="section-title">
        <div>
            <h3 class="text-lg font-semibold">Analisis Perbandingan Periode</h3>
            <p class="hint">Pilih indikator untuk melihat analisis perbandingan periode (Q ke Q, M ke M, Y ke Y, YTD, C ke C).</p>
        </div>
    </div>

    <form id="pivot-form" class="form-grid">
        <div class="form-control">
            <label for="analysis_indicator" class="label">
                <span class="label-text">Pilih Indikator</span>
            </label>
            <select id="analysis_indicator" name="analysis_indicator" class="control" required>
                <option value="">Pilih indikator...</option>
                {% for indicator in summary.indicators %}
                <option value="{{ indicator }}">{{ indicator }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-control">
            <label for="analysis_year" class="label">
                <span class="label-text">Tahun Analisis</span>
            </label>
            <select id="analysis_year" name="analysis_year" class="control">
                <option value="">Semua Tahun</option>
                {% set available_years = summary.available_years if summary is defined and summary.available_years is defined else [] %}
                {% for year in available_years %}
                <option value="{{ year }}">{{ year }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-control">
            <label for="period_start" class="label">
                <span class="label-text">Rentang Periode Mulai (opsional)</span>
            </label>
            <input
                type="text"
                id="period_start"
                name="period_start"
                class="control"
                placeholder="YYYY / YYYY-MM / YYYY-Q1"
                pattern="^$|^\d{4}(-\d{1,2}|-Q[1-4])?$"
                title="Contoh: 2024, 2024-01, 2024-Q1"
            >
        </div>
        <div class="form-control">
            <label for="period_end" class="label">
                <span class="label-text">Rentang Periode Akhir (opsional)</span>
            </label>
            <input
                type="text"
                id="period_end"
                name="period_end"
                class="control"
                placeholder="YYYY / YYYY-MM / YYYY-Q1"
                pattern="^$|^\d{4}(-\d{1,2}|-Q[1-4])?$"
                title="Contoh: 2024, 2024-12, 2024-Q4"
            >
        </div>
        <div class="form-actions-bar md:col-span-2 xl:col-span-3">
            <button type="button" id="generate-pivot" class="btn btn-primary">Hasilkan Analisis Periode</button>
            <button type="button" id="reset-pivot" class="btn-soft">Atur Ulang</button>
        </div>
    </form>
    <div id="pivot-form-status" class="alert alert-warning text-sm mt-4 hidden" role="status" aria-live="polite"></div>

    <div class="mt-6 border-t border-base-300 pt-6">
        <div id="pivot-result">
            <p class="text-base-content/60 mb-0">Klik "Hasilkan Analisis Periode" untuk melihat analisis data.</p>
        </div>
    </div>
</section>
