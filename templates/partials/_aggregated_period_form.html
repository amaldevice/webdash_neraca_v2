<section class="panel mb-6">
    <div class="section-title">
        <div>
            <h3 class="text-lg font-semibold">Analisis Perbandingan Periode</h3>
            <p class="hint">Pilih indikator untuk melihat analisis perbandingan periode (Q ke Q, M ke M, Y ke Y, YTD, C ke C).</p>
        </div>
    </div>

    <form id="pivot-form" class="form-grid">
        <div class="form-control">
            <label for="analysis_indicator" class="label">
                <span class="label-text">Pilih Indikator</span>
            </label>
            <select id="analysis_indicator" name="analysis_indicator" class="select select-bordered w-full" required>
                <option value="">Pilih indikator...</option>
                {% for indicator in summary.indicators %}
                <option value="{{ indicator }}">{{ indicator }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-control">
            <label for="analysis_year" class="label">
                <span class="label-text">Tahun Analisis</span>
            </label>
            <select id="analysis_year" name="analysis_year" class="select select-bordered w-full">
                <option value="">Semua Tahun</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
                <option value="2021">2021</option>
                <option value="2020">2020</option>
            </select>
        </div>
        <div class="form-actions-bar md:col-span-2 xl:col-span-3">
            <button type="button" id="generate-pivot" class="btn btn-primary">Hasilkan Analisis Periode</button>
            <button type="button" id="reset-pivot" class="btn btn-outline">Atur Ulang</button>
        </div>
    </form>

    <div class="mt-6 border-t border-base-300 pt-6">
        <div id="pivot-result">
            <p class="text-base-content/60 mb-0">Klik "Hasilkan Analisis Periode" untuk melihat analisis data.</p>
        </div>
    </div>
</section>
