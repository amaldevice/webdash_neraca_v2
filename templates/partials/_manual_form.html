<form method="POST" class="grid gap-4">
    <div class="form-control">
        <label for="uploader" class="label">
            <span class="label-text">Pengunggah</span>
        </label>
        <input id="uploader" name="uploader" class="input input-bordered w-full" required>
        <label class="label">
            <span class="label-text-alt text-slate-400">Nama penanggung jawab unggahan.</span>
        </label>
    </div>

    <div class="form-control">
        <label for="version" class="label">
            <span class="label-text">Versi</span>
        </label>
        <input id="version" name="version" class="input input-bordered w-full" required>
        <label class="label">
            <span class="label-text-alt text-slate-400">Gunakan format v1.0, v2.0, dll.</span>
        </label>
    </div>

    <div class="form-control">
        <label for="data_type" class="label">
            <span class="label-text">Jenis Data</span>
        </label>
        <select id="data_type" name="data_type" class="select select-bordered w-full">
            <option value="flow">Flow</option>
            <option value="stock">Stock</option>
        </select>
        <label class="label">
            <span class="label-text-alt text-slate-400">Flow = arus, Stock = posisi.</span>
        </label>
    </div>

    <div class="form-control">
        <label for="time_period" class="label">
            <span class="label-text">Periode</span>
        </label>
        <select id="time_period" name="time_period" class="select select-bordered w-full" onchange="updatePeriodFormat()">
            <option value="monthly">Bulanan</option>
            <option value="quarterly">Triwulanan</option>
            <option value="yearly">Tahunan</option>
        </select>
    </div>

    <div class="form-control">
        <label for="period_date" class="label">
            <span class="label-text">Periode Data</span>
        </label>
        <input id="period_date" name="period_date" type="text" class="input input-bordered w-full" placeholder="Format: YYYY-MM untuk Bulanan, YYYY untuk Tahunan" required>
        <label class="label">
            <span class="label-text-alt text-slate-400">Gunakan format periode sesuai pilihan di atas.</span>
        </label>
    </div>

    <div class="form-control">
        <label for="indicator" class="label">
            <span class="label-text">Indikator</span>
        </label>
        <input id="indicator" name="indicator" class="input input-bordered w-full" required>
    </div>

    <div class="form-control">
        <label for="value" class="label">
            <span class="label-text">Nilai</span>
        </label>
        <input id="value" name="value" type="number" step="any" class="input input-bordered w-full" required>
    </div>

    <div class="flex flex-wrap gap-2">
        <button type="submit" class="btn btn-primary">Simpan Entri Manual</button>
        <a href="{{ url_for('preview_data') }}" class="btn btn-outline">Lihat Pratinjau</a>
    </div>
</form>
