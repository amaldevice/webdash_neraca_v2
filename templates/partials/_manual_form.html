<form method="POST" class="space-y-5">
    <div class="form-grid">
    <div class="form-control">
        <label for="uploader" class="label">
            <span class="label-text">Pengunggah</span>
        </label>
        <input id="uploader" name="uploader" class="control" required>
        <label class="label">
            <span class="field-help">Nama penanggung jawab unggahan.</span>
        </label>
    </div>

    <div class="form-control">
        <label for="version" class="label">
            <span class="label-text">Versi</span>
        </label>
        <input id="version" name="version" class="control" required>
        <label class="label">
            <span class="field-help">Gunakan format v1.0, v2.0, dll.</span>
        </label>
    </div>

    <div class="form-control">
        <label for="data_type" class="label">
            <span class="label-text">Jenis Data</span>
        </label>
        <select id="data_type" name="data_type" class="control">
            <option value="flow">Flow</option>
            <option value="stock">Stock</option>
        </select>
        <label class="label">
            <span class="field-help">Flow = arus, Stock = posisi.</span>
        </label>
    </div>

    <div class="form-control">
        <label for="time_period" class="label">
            <span class="label-text">Periode</span>
        </label>
        <select id="time_period" name="time_period" class="control" onchange="updatePeriodFormat()">
            <option value="monthly">Bulanan</option>
            <option value="quarterly">Triwulanan</option>
            <option value="yearly">Tahunan</option>
        </select>
    </div>
    </div>

    <div class="form-grid">
        <div class="form-control md:col-span-2">
        <label for="period_date" class="label">
            <span class="label-text">Periode Data</span>
        </label>
        <input id="period_date" name="period_date" type="text" class="control" placeholder="Format: YYYY-MM untuk Bulanan, YYYY untuk Tahunan" required>
        <label class="label">
            <span class="field-help">Gunakan format periode sesuai pilihan di atas.</span>
        </label>
    </div>

    <div class="form-control">
        <label for="indicator" class="label">
            <span class="label-text">Indikator</span>
        </label>
        <input id="indicator" name="indicator" class="control" required>
    </div>

    <div class="form-control">
        <label for="value" class="label">
            <span class="label-text">Nilai</span>
        </label>
        <input id="value" name="value" type="number" step="any" class="control" required>
    </div>
    </div>

    <div class="form-actions-bar">
        <button type="submit" class="btn btn-primary">Simpan Entri Manual</button>
        <a href="{{ url_for('preview_data') }}" class="btn-soft">Lihat Pratinjau</a>
    </div>
</form>
