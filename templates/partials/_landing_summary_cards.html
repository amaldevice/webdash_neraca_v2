<section class="card-grid">
    {% for card in summary.cards %}
    <article class="stat-card">
        <div class="flex items-start justify-between gap-3">
            <p class="text-xs uppercase tracking-[0.2em] text-base-content/60">{{ card.title }}</p>
            <span class="btn btn-circle btn-xs btn-ghost pointer-events-none" aria-hidden="true">
                {% if loop.index0 % 3 == 0 %}
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 13l4-4 4 4 8-8" />
                </svg>
                {% elif loop.index0 % 3 == 1 %}
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-2.21 0-4 1.79-4 4m8 0a4 4 0 11-8 0m8 0h3m-3 0a4 4 0 01-8 0m8 0a4 4 0 00-8 0" />
                </svg>
                {% else %}
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-6h13M9 5h13M3 7h.01M3 17h.01" />
                </svg>
                {% endif %}
            </span>
        </div>
        <div class="kpi">
            <p class="text-3xl font-semibold leading-tight">{{ card.value }}</p>
            <p class="hint">{{ card.label }}</p>
        </div>
    </article>
    {% endfor %}
</section>
