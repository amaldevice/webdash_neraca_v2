<script>
function setPreviewFilterStatus(message, type = 'info') {
    const statusEl = document.getElementById('preview-filter-status');
    if (!statusEl) return;

    const classes = {
        info: 'alert-info',
        warning: 'alert-warning',
        error: 'alert-error',
        success: 'alert-success'
    };

    statusEl.className = `alert text-sm mt-4 ${classes[type] || classes.info}`;
    statusEl.textContent = message;
    statusEl.classList.remove('hidden');
}

function clearPreviewFilterStatus() {
    const statusEl = document.getElementById('preview-filter-status');
    if (!statusEl) return;

    statusEl.textContent = '';
    statusEl.classList.add('hidden');
}

function resetForm() {
    document.getElementById('data_type').value = '';
    document.getElementById('time_period').value = '';
    document.getElementById('start_period').value = '';
    document.getElementById('end_period').value = '';
    document.getElementById('value_min').value = '';
    document.getElementById('value_max').value = '';
    document.getElementById('uploader').value = '';
    document.getElementById('indicator').value = '';
    document.getElementById('limit').value = '20';

    setPreviewFilterStatus('Filter diatur ulang. Memuat data tanpa filter...', 'info');
    const form = document.querySelector('form');
    if (form) {
        form.submit();
    }
}

function clearField(fieldId) {
    document.getElementById(fieldId).value = '';
}

function setLimitAndSubmit(limitValue) {
    document.getElementById('limit').value = limitValue;
    const form = document.querySelector('form');
    if (form) {
        form.submit();
    }
}

document.addEventListener('DOMContentLoaded', function() {
    clearPreviewFilterStatus();

    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'Enter') {
            e.preventDefault();
            const form = document.querySelector('form');
            if (form) {
                form.submit();
            }
        }
    });
});

function changeLimit(newLimit) {
    const urlParams = new URLSearchParams(window.location.search);
    urlParams.set('limit', newLimit);
    urlParams.set('page', '1');
    window.location.href = window.location.pathname + '?' + urlParams.toString();
}
</script>
