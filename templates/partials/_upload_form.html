<form method="POST" enctype="multipart/form-data" class="space-y-5">
    <div class="form-grid">
    <div class="form-control">
        <label for="uploader" class="label">
            <span class="label-text">Pengunggah</span>
        </label>
        <input
            id="uploader"
            name="uploader"
            class="control"
            value="{{ form_values.uploader if form_values else '' }}"
            required
        >
        <label class="label">
            <span class="field-help">Nama penanggung jawab unggahan.</span>
        </label>
    </div>

    <div class="form-control">
        <label for="version" class="label">
            <span class="label-text">Versi</span>
        </label>
        <input
            id="version"
            name="version"
            class="control"
            value="{{ form_values.version if form_values else '' }}"
            required
        >
        <label class="label">
            <span class="field-help">Gunakan format v1.0, v2.0, dll.</span>
        </label>
    </div>

    <div class="form-control">
        <label for="data_type" class="label">
            <span class="label-text">Jenis Data</span>
        </label>
        <select id="data_type" name="data_type" class="control">
            <option value="flow" {% if not form_values or form_values.data_type == 'flow' %}selected{% endif %}>Flow</option>
            <option value="stock" {% if form_values and form_values.data_type == 'stock' %}selected{% endif %}>Stock</option>
        </select>
        <label class="label">
            <span class="field-help">Flow = arus, Stock = posisi.</span>
        </label>
    </div>

    <div class="form-control">
        <label for="time_period" class="label">
            <span class="label-text">Periode</span>
        </label>
        <select id="time_period" name="time_period" class="control">
            <option value="monthly" {% if not form_values or form_values.time_period == 'monthly' %}selected{% endif %}>Bulanan</option>
            <option value="quarterly" {% if form_values and form_values.time_period == 'quarterly' %}selected{% endif %}>Triwulanan</option>
            <option value="yearly" {% if form_values and form_values.time_period == 'yearly' %}selected{% endif %}>Tahunan</option>
        </select>
    </div>

    <div class="form-control">
        <label for="layout_override" class="label">
            <span class="label-text">Tipe Layout</span>
        </label>
        <select id="layout_override" name="layout_override" class="control">
            <option value="auto" {% if not form_values or not form_values.layout_override or form_values.layout_override == 'auto' %}selected{% endif %}>Auto (deteksi otomatis)</option>
            <option value="vertical" {% if form_values and form_values.layout_override == 'vertical' %}selected{% endif %}>Vertical (kolom period)</option>
            <option value="horizontal" {% if form_values and form_values.layout_override == 'horizontal' %}selected{% endif %}>Horizontal (baris period)</option>
        </select>
        <label class="label">
            <span class="field-help">Pilih jika format Excel tidak terdeteksi otomatis.</span>
        </label>
    </div>

    <input type="hidden" name="preview_token" value="{{ upload_preview_token or '' }}">
    <input type="hidden" name="csrf_token" value="{{ upload_csrf_token }}">
    </div>

    <div class="rounded-2xl border border-dashed border-base-300 bg-base-200/30 p-4">
        <div class="section-title pb-0 mb-3 border-b-0">
            <h4 class="font-semibold">Berkas Sumber</h4>
        </div>
        <div class="form-control">
            <label for="excel_file" class="label">
                <span class="label-text">File Excel</span>
            </label>
            <input id="excel_file" name="excel_file" type="file" class="file-input file-input-bordered file-input-primary w-full" accept=".xls,.xlsx" required>
            <label class="label">
                <span class="field-help">Format .xls atau .xlsx. Pastikan satu sheet aktif berisi data.</span>
            </label>
        </div>

        <div class="form-control">
            <a
                href="{{ url_for('static', filename='templates/upload_template.xlsx') }}"
                class="btn btn-soft w-full"
                download="upload_template.xlsx"
            >
                Unduh Template Excel
            </a>
            <label class="label">
                <span class="field-help">
                    File template kini berisi 2 sheet:
                    <strong>Template_Horizontal</strong> (indikator di kolom kiri, periode di baris header) dan
                    <strong>Template_Vertical</strong> (periode di kolom kiri, indikator di baris header).
                </span>
            </label>
        </div>
        <div class="label">
            <span class="field-help">
                Upload parser hanya membaca sheet aktif/pertama, jadi aktifkan sheet yang sesuai format yang ingin dipakai.
                Untuk format lain, pilih <strong>layout override</strong> <strong>vertical</strong> atau <strong>horizontal</strong>.
            </span>
        </div>
            </div>
    </div>

    <div class="form-actions-bar">
        <button type="submit" name="action" value="preview" class="btn btn-primary">Unggah &amp; Pratinjau</button>
        <button type="submit" name="action" value="save" class="btn-soft">Simpan Langsung</button>
        <a href="{{ url_for('preview_data') }}" class="btn-soft">Lihat Pratinjau</a>
    </div>
</form>
