<script>
let confirmActionHandler = null;

function setManagementStatus(message, type = 'warning') {
    const statusEl = document.getElementById('management-inline-status');
    if (!statusEl) return;

    const classes = {
        info: 'alert-info',
        warning: 'alert-warning',
        error: 'alert-error',
        success: 'alert-success'
    };

    statusEl.className = `alert text-sm mt-3 ${classes[type] || classes.warning}`;
    statusEl.textContent = message;
    statusEl.classList.remove('hidden');
}

function clearManagementStatus() {
    const statusEl = document.getElementById('management-inline-status');
    if (!statusEl) return;

    statusEl.textContent = '';
    statusEl.classList.add('hidden');
}

function getVisibleRowCheckboxes() {
    const all = Array.from(document.querySelectorAll('.row-checkbox'));
    return all.filter(cb => cb.offsetParent !== null);
}

function getCheckedVisibleRowCheckboxes() {
    return getVisibleRowCheckboxes().filter(cb => cb.checked);
}

function toggleSelectAll() {
    const selectAll = document.getElementById('select-all');
    if (!selectAll) return;
    const checkboxes = getVisibleRowCheckboxes();
    checkboxes.forEach(cb => { cb.checked = selectAll.checked; });
    updateBulkActions();
    updateSelectAllState();
}

function toggleSelectAllMobile(mobileSelectAll) {
    if (!mobileSelectAll) return;
    // Get only mobile visible checkboxes (in mobile table)
    const mobileTable = mobileSelectAll.closest('table');
    if (!mobileTable) return;
    const checkboxes = mobileTable.querySelectorAll('.row-checkbox');
    checkboxes.forEach(cb => { cb.checked = mobileSelectAll.checked; });
    updateBulkActions();
}

function updateBulkActions() {
    const checkboxes = getCheckedVisibleRowCheckboxes();
    const bulkActions = document.getElementById('bulk-actions');
    const selectedCount = document.getElementById('selected-count');
    if (!bulkActions || !selectedCount) return;

    if (checkboxes.length > 0) {
        bulkActions.style.display = 'flex';
        selectedCount.textContent = `${checkboxes.length} data dipilih`;
        clearManagementStatus();
    } else {
        bulkActions.style.display = 'none';
    }

    const allCheckboxes = getVisibleRowCheckboxes();
    const selectAll = document.getElementById('select-all');
    if (!selectAll) return;
    selectAll.checked = allCheckboxes.length > 0 && checkboxes.length === allCheckboxes.length;
    selectAll.indeterminate = checkboxes.length > 0 && checkboxes.length < allCheckboxes.length;
}

function openConfirmModal({ title, message, confirmLabel = 'Hapus', confirmClass = 'btn btn-error', onConfirm }) {
    const modal = document.getElementById('confirm-action-modal');
    const titleEl = document.getElementById('confirm-action-title');
    const messageEl = document.getElementById('confirm-action-message');
    const submitBtn = document.getElementById('confirm-action-submit');

    if (!modal || !titleEl || !messageEl || !submitBtn) {
        return false;
    }

    titleEl.textContent = title;
    messageEl.textContent = message;
    submitBtn.textContent = confirmLabel;
    submitBtn.className = confirmClass;
    confirmActionHandler = typeof onConfirm === 'function' ? onConfirm : null;

    modal.showModal();
    return false;
}

function confirmBulkDelete() {
    const checkboxes = getCheckedVisibleRowCheckboxes();
    if (checkboxes.length === 0) {
        setManagementStatus('Pilih data yang ingin dihapus terlebih dahulu.', 'warning');
        return;
    }

    openConfirmModal({
        title: 'Hapus data terpilih?',
        message: `${checkboxes.length} data yang dipilih akan dihapus permanen.`,
        confirmLabel: 'Hapus Terpilih',
        confirmClass: 'btn btn-error',
        onConfirm: () => {
            const form = document.getElementById('bulk-delete-form');
            form.querySelectorAll('input[name="selected_ids[]"]').forEach(input => input.remove());

            checkboxes.forEach(cb => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'selected_ids[]';
                input.value = cb.value;
                form.appendChild(input);
            });
            form.submit();
        }
    });
}

function openBulkUpdateModal() {
    const checkboxes = getCheckedVisibleRowCheckboxes();
    if (checkboxes.length === 0) {
        setManagementStatus('Pilih data yang ingin diperbarui terlebih dahulu.', 'warning');
        return;
    }

    const modal = document.getElementById('bulk-update-modal');
    if (modal) {
        modal.showModal();
    }
}

function closeBulkUpdateModal() {
    const modal = document.getElementById('bulk-update-modal');
    if (modal) {
        modal.close();
    }
}

function openEntryEditModal(trigger) {
    const modal = document.getElementById('entry-edit-modal');
    if (!modal || !trigger) {
        return;
    }

    const entryId = trigger.dataset.entryId || '';
    const uploader = trigger.dataset.uploader || '';
    const version = trigger.dataset.version || '';
    const indicator = trigger.dataset.indicator || '';
    const value = trigger.dataset.value || '';
    const dataType = trigger.dataset.dataType || 'flow';
    const timePeriod = trigger.dataset.timePeriod || 'monthly';

    document.getElementById('entry_update_id').value = entryId;
    document.getElementById('entry_update_uploader').value = uploader;
    document.getElementById('entry_update_version').value = version;
    document.getElementById('entry_update_indicator').value = indicator;
    document.getElementById('entry_update_value').value = value;
    document.getElementById('entry_update_data_type').value = dataType;
    document.getElementById('entry_update_time_period').value = timePeriod;

    clearManagementStatus();
    modal.showModal();
}

function closeEntryEditModal() {
    const modal = document.getElementById('entry-edit-modal');
    if (modal) {
        modal.close();
    }
}

function bindConfirmActionButtons() {
    const confirmButtons = document.querySelectorAll('.js-confirm-action');
    confirmButtons.forEach(button => {
        button.addEventListener('click', function() {
            const form = this.closest('form');
            if (!form) {
                return;
            }

            const title = this.dataset.confirmTitle || 'Konfirmasi Tindakan';
            const message = this.dataset.confirmMessage || 'Apakah Anda yakin ingin melanjutkan?';
            const confirmLabel = this.dataset.confirmLabel || 'Lanjutkan';
            const confirmClass = this.dataset.confirmClass || 'btn btn-error';

            openConfirmModal({
                title,
                message,
                confirmLabel,
                confirmClass,
                onConfirm: () => form.submit()
            });
        });
    });
}

function updateInsertPeriodFormat() {
    const timePeriodEl = document.getElementById('insert_time_period');
    const periodInput = document.getElementById('insert_period_date');
    if (!timePeriodEl || !periodInput) return;

    const timePeriod = timePeriodEl.value;

    switch(timePeriod) {
        case 'monthly':
            periodInput.placeholder = 'Format: YYYY-MM (contoh: 2024-01)';
            periodInput.pattern = '\\d{4}-\\d{2}';
            periodInput.title = 'Format: YYYY-MM';
            break;
        case 'quarterly':
            periodInput.placeholder = 'Format: YYYY-Q1/Q2/Q3/Q4 atau YYYY-MM (contoh: 2024-Q1 / 2024-01)';
            periodInput.pattern = '\\d{4}-(?:Q[1-4]|\\d{1,2})';
            periodInput.title = 'Format: YYYY-Q1 sampai YYYY-Q4, atau YYYY-MM';
            break;
        case 'yearly':
            periodInput.placeholder = 'Format: YYYY atau YYYY-MM (contoh: 2024 atau 2021-01)';
            periodInput.pattern = '\\d{4}(?:-\\d{1,2})?';
            periodInput.title = 'Format: YYYY atau YYYY-MM';
            break;
    }
}

function changeLimit(newLimit) {
    const urlParams = new URLSearchParams(window.location.search);
    urlParams.set('limit', newLimit);
    urlParams.set('page', '1');
    window.location.href = window.location.pathname + '?' + urlParams.toString();
}

function saveCheckboxState() {
    const checkedBoxes = getCheckedVisibleRowCheckboxes();
    const checkedIds = Array.from(checkedBoxes).map(cb => cb.value);
    localStorage.setItem('dataManagementSelectedIds', JSON.stringify(checkedIds));
}

function restoreCheckboxState() {
    const savedIds = localStorage.getItem('dataManagementSelectedIds');
    if (savedIds) {
        const selectedIds = JSON.parse(savedIds);
        selectedIds.forEach(id => {
            const checkboxes = document.querySelectorAll(`.row-checkbox[value="${id}"]`);
            checkboxes.forEach(checkbox => {
                if (checkbox.offsetParent !== null) {
                    checkbox.checked = true;
                }
            });
        });
    }
}

document.addEventListener('DOMContentLoaded', function() {
    updateInsertPeriodFormat();
    restoreCheckboxState();
    updateSelectAllState();
    bindConfirmActionButtons();

    const confirmModal = document.getElementById('confirm-action-modal');
    const confirmCancel = document.getElementById('confirm-action-cancel');
    const confirmSubmit = document.getElementById('confirm-action-submit');
    const bulkUpdateModal = document.getElementById('bulk-update-modal');
    const entryEditModal = document.getElementById('entry-edit-modal');

    if (confirmCancel && confirmModal) {
        confirmCancel.addEventListener('click', function() {
            confirmModal.close();
            confirmActionHandler = null;
        });
    }

    if (confirmSubmit && confirmModal) {
        confirmSubmit.addEventListener('click', function() {
            const handler = confirmActionHandler;
            confirmModal.close();
            confirmActionHandler = null;
            if (handler) {
                handler();
            }
        });
    }

    if (confirmModal) {
        confirmModal.addEventListener('close', function() {
            confirmActionHandler = null;
        });
    }

    if (bulkUpdateModal) {
        bulkUpdateModal.addEventListener('close', function() {
            document.getElementById('bulk-update-form').reset();
        });
    }

    if (entryEditModal) {
        entryEditModal.addEventListener('close', function() {
            const editForm = entryEditModal.querySelector('form[method="POST"]');
            if (editForm) {
                editForm.reset();
            }
        });
    }

    const bulkActions = document.getElementById('bulk-actions');
    if (bulkActions) {
        bulkActions.style.display = 'none';
        bulkActions.removeAttribute('hidden');
    }

    updateBulkActions();
    clearManagementStatus();

    const checkboxes = document.querySelectorAll('.row-checkbox');
    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            updateBulkActions();
            saveCheckboxState();
        });
    });

    const selectAll = document.getElementById('select-all');
    if (selectAll) {
        selectAll.addEventListener('change', function() {
            toggleSelectAll();
            saveCheckboxState();
        });
    }
});

function updateSelectAllState() {
    const checkboxes = getVisibleRowCheckboxes();
    const selectAll = document.getElementById('select-all');

    if (!selectAll) return;

    const checkedCount = getCheckedVisibleRowCheckboxes().length;
    const totalCount = checkboxes.length;

    selectAll.checked = checkedCount === totalCount && totalCount > 0;
    selectAll.indeterminate = checkedCount > 0 && checkedCount < totalCount;
}
</script>
