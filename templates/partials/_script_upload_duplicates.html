<script>
function getDuplicateSelectionInputs() {
    const form = document.querySelector('form[aria-label="Konfirmasi pratinjau unggahan"]');
    if (!form) {
        return [];
    }
    return form.querySelectorAll('input[name="skip_duplicate_indexes"]');
}

function getDuplicateSelectionStats() {
    const inputs = getDuplicateSelectionInputs();
    const selectedCount = Array.from(inputs).filter((input) => input.checked).length;
    return {
        total: inputs.length,
        selectedCount,
        overwriteCount: inputs.length - selectedCount,
    };
}

function getDuplicateActionCopy(stats) {
    const { total, selectedCount, overwriteCount } = stats;
    if (!total) {
        return "";
    }
    if (overwriteCount === 0) {
        return "Semua kandidat duplikasi dikecualikan. Tidak ada baris yang ditimpa.";
    }
    if (selectedCount === 0) {
        return `${overwriteCount} kandidat duplikasi akan ditimpa.`;
    }
    return `${overwriteCount} kandidat duplikasi akan ditimpa, ${selectedCount} kandidat dikecualikan.`;
}

function toggleDuplicateSelection(checked) {
    const inputs = getDuplicateSelectionInputs();
    inputs.forEach((input) => {
        input.checked = checked;
    });
    updateDuplicateSelectionSummary();
}

function invertDuplicateSelection() {
    const inputs = getDuplicateSelectionInputs();
    inputs.forEach((input) => {
        input.checked = !input.checked;
    });
    updateDuplicateSelectionSummary();
}

function updateDuplicateSelectionSummary() {
    const summary = document.querySelector('[data-duplicate-selection-summary]');
    if (!summary) {
        return;
    }
    const stats = getDuplicateSelectionStats();
    summary.textContent = `${stats.selectedCount} dari ${stats.total} kandidat dipilih untuk dikecualikan.`;

    const warningEl = document.querySelector('[data-duplicate-overwrite-summary]');
    if (warningEl) {
        warningEl.textContent = getDuplicateActionCopy(stats);
    }
}

function initDuplicateSelectionSummary() {
    const form = document.querySelector('form[aria-label="Konfirmasi pratinjau unggahan"]');
    if (!form) {
        return;
    }
    updateDuplicateSelectionSummary();
    form.addEventListener("change", (event) => {
        if (event.target && event.target.name === "skip_duplicate_indexes") {
            updateDuplicateSelectionSummary();
        }
    });

    form.addEventListener("submit", (event) => {
        const stats = getDuplicateSelectionStats();
        if (!stats.total) {
            return;
        }
        const message = getDuplicateActionCopy(stats);
        const promptText = `${message}\nLanjutkan proses simpan?`;
        if (!window.confirm(promptText)) {
            event.preventDefault();
        }
    });
}

document.addEventListener("DOMContentLoaded", initDuplicateSelectionSummary);
</script>
