<section class="panel mb-6">
    <div class="section-title">
        <div>
            <h3 class="text-lg font-semibold">Tambah Data Baru</h3>
            <p class="hint">Input cepat untuk menambahkan entri tunggal ke basis data.</p>
        </div>
    </div>
    <form method="POST" class="form-grid">
        <input type="hidden" name="action" value="insert">
        <div class="form-control">
            <label for="insert_uploader" class="label">
                <span class="label-text">Pengunggah *</span>
            </label>
            <input type="text" id="insert_uploader" name="insert_uploader" class="input input-bordered w-full" required placeholder="Nama pengunggah">
        </div>
        <div class="form-control">
            <label for="insert_version" class="label">
                <span class="label-text">Versi *</span>
            </label>
            <input type="text" id="insert_version" name="insert_version" class="input input-bordered w-full" required placeholder="v1.0, v2.0, dll.">
        </div>
        <div class="form-control">
            <label for="insert_data_type" class="label">
                <span class="label-text">Jenis Data</span>
            </label>
            <select id="insert_data_type" name="insert_data_type" class="select select-bordered w-full">
                <option value="flow" selected>Flow</option>
                <option value="stock">Stock</option>
            </select>
            <label class="label">
                <span class="label-text-alt text-base-content/60">Flow = arus, Stock = posisi.</span>
            </label>
        </div>
        <div class="form-control">
            <label for="insert_time_period" class="label">
                <span class="label-text">Periode</span>
            </label>
            <select id="insert_time_period" name="insert_time_period" class="select select-bordered w-full" onchange="updateInsertPeriodFormat()">
                <option value="monthly" selected>Bulanan</option>
                <option value="quarterly">Triwulanan</option>
                <option value="yearly">Tahunan</option>
            </select>
        </div>
        <div class="form-control">
            <label for="insert_period_date" class="label">
                <span class="label-text">Periode Data *</span>
            </label>
            <input type="text" id="insert_period_date" name="insert_period_date" class="input input-bordered w-full" required placeholder="Format: YYYY-MM untuk Bulanan, YYYY untuk Tahunan">
            <label class="label">
                <span class="label-text-alt text-base-content/60">Isi sesuai format periode terpilih.</span>
            </label>
        </div>
        <div class="form-control">
            <label for="insert_indicator" class="label">
                <span class="label-text">Indikator *</span>
            </label>
            <input type="text" id="insert_indicator" name="insert_indicator" class="input input-bordered w-full" required placeholder="GDP, Inflasi, dll.">
        </div>
        <div class="form-control">
            <label for="insert_value" class="label">
                <span class="label-text">Nilai *</span>
            </label>
            <input type="number" step="0.01" id="insert_value" name="insert_value" class="input input-bordered w-full" required placeholder="123,45">
        </div>
        <div class="form-actions-bar md:col-span-2 xl:col-span-4">
            <button type="submit" class="btn btn-primary">Tambah Data</button>
        </div>
    </form>
</section>
