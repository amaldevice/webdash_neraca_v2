[tool:pytest]
# Pytest configuration untuk functional tests

# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Basic options
addopts =
    --strict-markers
    --strict-config
    --disable-warnings
    --tb=short

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    performance: marks tests as performance tests
    smoke: marks tests as smoke tests (quick validation)

# Output formatting
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Test execution
timeout = 300
timeout_method = thread

# Coverage (jika menggunakan --cov)
[coverage:run]
source = ../../app.py, ../../models.py, ../../excel_parser.py, ../../aggregator.py
omit =
    */tests/*
    */simple_tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod