name: CI

on:
  push:
    branches: [main, master, alternative_main]
  pull_request:
    branches: [main, master, alternative_main]

jobs:
  test-sqlite:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Pytest (SQLite default, no remote integration)
        run: python -m pytest tests --ignore=tests/integration -q --tb=short

  integration-mysql:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: webdash_test
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ptestpass --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30
    env:
      DATABASE_URL: mysql+pymysql://root:testpass@127.0.0.1:3306/webdash_test?charset=utf8mb4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Alembic upgrade
        run: python -m alembic upgrade head
      - name: Remote dialect smoke
        run: python -m pytest tests/integration -q --tb=short

  integration-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: webdash_test
        options: >-
          --health-cmd="pg_isready -U postgres -h 127.0.0.1 -p 5432"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/webdash_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Alembic upgrade
        run: python -m alembic upgrade head
      - name: Remote dialect smoke
        run: python -m pytest tests/integration -q --tb=short
